
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fim do www</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #ffffff;
            --accent1: #00ffcc;
            --accent2: #ff0055;
            --hud-color: rgba(255, 255, 255, 0.3);
            --transition-slide: 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            --transition-step: 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030305;
            color: var(--text);
            overflow: hidden;
            cursor: none;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 8vw 6vw;
            pointer-events: none;
            
            transition: transform var(--transition-slide),
                        opacity var(--transition-slide),
                        filter var(--transition-slide);
            z-index: 1;
        }

        /* ESTADOS DOS SLIDES */
        .slide.upcoming-left { transform: translateX(40vw) scale(0.95); opacity: 0; filter: blur(5px); }
        .slide.upcoming-up   { transform: translateY(40vh) scale(0.95); opacity: 0; filter: blur(5px); }
        .slide.upcoming-zoom { transform: scale(0.3); opacity: 0; filter: blur(20px); }

        .slide.active {
            transform: translate(0, 0) scale(1);
            opacity: 1;
            filter: blur(0);
            pointer-events: auto;
            z-index: 10;
        }

        .slide.past-left { transform: translateX(-15vw) scale(0.8); opacity: 0.03; filter: blur(8px); z-index: 0; }
        .slide.past-up { transform: translateY(-20vh) scale(0.8); opacity: 0.03; filter: blur(8px); z-index: 0; }
        .slide.past-zoom { transform: scale(8); opacity: 0; filter: blur(10px); z-index: 20; }

        .slide[class*="past"] .step {
            opacity: 1 !important;
            transform: translate(0, 0) !important;
            transition: none !important;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 90vw;
        }

        .step {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity var(--transition-step), transform var(--transition-step);
        }

        .step.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* TYPOGRAPHY CLAMP (OVERSIZED SWISS DESIGN) */
        .t-display {
            font-size: clamp(60px, 14vw, 250px);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        .t-h1 {
            font-size: clamp(40px, 9vw, 150px);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        .t-h2 {
            font-size: clamp(28px, 6vw, 100px);
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: #d0d0d0;
        }

        /* WATERMARKS SVG DINÂMICOS */
        .watermark {
            position: absolute;
            top: 50%;
            right: -5%;
            transform: translateY(-50%) rotate(-5deg);
            width: 110vh;
            height: 110vh;
            opacity: 0.03;
            z-index: 0;
            pointer-events: none;
            color: var(--text);
            transition: transform 15s linear, opacity var(--transition-slide);
        }

        .slide.active .watermark {
            transform: translateY(-50%) rotate(5deg) scale(1.05);
            opacity: 0.08;
        }

        /* HUD */
        #hud {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2vw;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 100;
            pointer-events: none;
        }

        #hud:hover, #hud.active-hover * { cursor: auto; pointer-events: auto; }

        .hud-left, .hud-right { display: flex; align-items: center; gap: 1.5vw; }

        .counter {
            font-variant-numeric: tabular-nums;
            font-size: 14px;
            font-weight: 600;
            color: var(--hud-color);
            letter-spacing: 0.1em;
        }

        .progress-track {
            width: 25vw;
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--text);
            width: 0%;
            transition: width 0.3s ease;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--hud-color);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .nav-btn:hover { opacity: 1; border-color: var(--text); transform: scale(1.1); }
        .nav-btn.disabled { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-left">
            <div class="counter" id="hud-counter">00 / 00</div>
            <div class="progress-track">
                <div class="progress-bar" id="hud-progress"></div>
            </div>
        </div>
        <div class="hud-right">
            <button class="nav-btn" id="btn-prev" aria-label="Recuar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="nav-btn" id="btn-next" aria-label="Avançar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
    </div>

    <script>
        // GERADOR DINÂMICO DE SVG (Números Gigantes e Símbolos em Outline)
        function generateSVG(symbol) {
            return `<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
                <text x="50" y="75" font-family="Inter" font-weight="900" font-size="80" text-anchor="middle" fill="none" stroke="currentColor" stroke-width="2" letter-spacing="-0.05em">${symbol}</text>
            </svg>`;
        }

        // ROTEIRO FRAGMENTADO (1 IDEIA POR FRAME)
        const scriptData = [
            // CAPÍTULO 1
            { sym: "01", type: "display", exit: "up", text: "Eu vi a internet nascer..." },
            { sym: "02", type: "h1", exit: "left", text: "...e vocês transformaram num shopping com música alta." },
            { sym: "03", type: "h2", exit: "up", text: "Quando eu entrei na internet, ela não tentava me vender nada." },
            { sym: "04", type: "h1", exit: "zoom", text: "Hoje ela me conhece melhor do que minha mãe." },
            
            { sym: "I", type: "display", exit: "up", text: "WWW ABERTO (1994–2010)" },
            { sym: "05", type: "h2", exit: "left", text: "A internet quando ainda tinha cheiro de garagem e café frio." },
            { sym: "06", type: "h1", exit: "left", text: "Links azuis. Fundo branco. GIFs questionáveis." },
            { sym: "07", type: "h2", exit: "up", text: "Você procurava coisas. Clicava em links estranhos." },
            { sym: "08", type: "h1", exit: "zoom", text: "Eu não sabia o que procurava — e isso era metade da graça." },
            
            { sym: "09", type: "h2", exit: "left", text: "Mantive um site pessoal em HTML puro que morreu em 2003." },
            { sym: "10", type: "h2", exit: "left", text: "Um contador de visitas que eu checava como batimento cardíaco." },
            { sym: "11", type: "h2", exit: "left", text: "Um livro de visitas onde o Klaus escreveu 'Nice page :)'." },
            { sym: "12", type: "h1", exit: "up", text: "Era caótico, lento, feio... Mas era seu." },
            
            { sym: "II", type: "display", exit: "zoom", text: "PLATAFORMAS SOCIAIS (2010–2023)" },
            { sym: "13", type: "h2", exit: "up", text: "Aí alguém teve uma ideia brilhante:" },
            { sym: "14", type: "h1", exit: "left", text: "'E se a gente cobrasse atenção como aluguel?'" },
            { sym: "15", type: "h2", exit: "left", text: "Sai o link, entra o feed. Sai a web, entra o jardim murado." },
            { sym: "16", type: "display", exit: "zoom", text: "VOCÊ NÃO NAVEGA. É CONDUZIDO." },
            
            { sym: "17", type: "h2", exit: "up", text: "Postei algo incrível → 12 curtidas." },
            { sym: "18", type: "h2", exit: "left", text: "Postei algo idiota → 40 mil visualizações." },
            { sym: "19", type: "h1", exit: "left", text: "Entendi o recado e fiquei com raiva." },
            { sym: "20", type: "h2", exit: "left", text: "Apaguei textos longos porque 'ninguém lê'." },
            { sym: "21", type: "h1", exit: "zoom", text: "Um lugar onde você fala, mas não é ouvido. Só medido." },
            
            { sym: "III", type: "display", exit: "up", text: "INTELIGÊNCIA ARTIFICIAL (2023–AGORA)" },
            { sym: "22", type: "h1", exit: "left", text: "A internet sem internet." },
            { sym: "23", type: "h2", exit: "up", text: "A IA chega dizendo: 'Relaxa. Eu leio tudo por você.'" },
            { sym: "24", type: "h2", exit: "left", text: "Resume. Elimina o clique. Responde sem mostrar o caminho." },
            { sym: "25", type: "h1", exit: "left", text: "Você não visita mais o site. Você pergunta o que tinha lá." },
            { sym: "26", type: "h2", exit: "up", text: "Passei 20 anos escrevendo coisas na web." },
            { sym: "27", type: "h2", exit: "left", text: "A IA absorveu, mastigou e respondeu em 5 linhas." },
            { sym: "28", type: "h1", exit: "left", text: "Nem um link. Nem um obrigado." },
            { sym: "29", type: "h1", exit: "zoom", text: "A IA transforma a web num banco de dados silencioso." },
            
            { sym: "VS", type: "display", exit: "up", text: "COMPARAÇÃO DIRETA" },
            { sym: "30", type: "h2", exit: "left", text: "WWW Antigo: Descoberta por curiosidade. Memória arquivável." },
            { sym: "31", type: "h2", exit: "left", text: "Plataformas: Descoberta por algoritmo. Memória efêmera." },
            { sym: "32", type: "h2", exit: "left", text: "IA: Descoberta por prompt. Memória opaca." },
            { sym: "33", type: "display", exit: "zoom", text: "ANTES EU NAVEGAVA. HOJE SOU NAVEGADO." },
            
            { sym: "?", type: "display", exit: "up", text: "MAS..." },
            { sym: "34", type: "h2", exit: "left", text: "Eu vejo sinais. Pequenos. Teimosos." },
            { sym: "35", type: "h1", exit: "left", text: "Blogs pessoais. RSS. Sites feios, mas sinceros." },
            { sym: "36", type: "h2", exit: "zoom", text: "Talvez a web esteja só esperando os adultos voltarem." },

            // CAPÍTULO 2
            { sym: "IV", type: "display", exit: "up", text: "A MEMÓRIA DIGITAL" },
            { sym: "37", type: "h1", exit: "left", text: "NÓS NUNCA ESCREVEMOS TANTO." },
            { sym: "38", type: "display", exit: "zoom", text: "E NUNCA ESQUECEMOS TÃO RÁPIDO." },
            
            { sym: "39", type: "h1", exit: "up", text: "QUANDO A INTERNET LEMBRAVA (1995–2010)" },
            { sym: "40", type: "h2", exit: "left", text: "Páginas estáticas, URLs persistentes, fóruns arquivados." },
            { sym: "41", type: "h2", exit: "left", text: "Um tutorial obscuro de 2004 sobre Photoshop que ainda funciona." },
            { sym: "42", type: "h1", exit: "up", text: "A web não tinha pressa. Ela aceitava envelhecer." },
            { sym: "43", type: "h2", exit: "zoom", text: "A memória era acidental, mas sólida." },
            
            { sym: "!", type: "display", exit: "up", text: "A VIRADA" },
            { sym: "44", type: "h2", exit: "left", text: "As plataformas disseram: 'Relaxa, a gente guarda tudo.'" },
            { sym: "45", type: "h1", exit: "left", text: "MENTIRA. Elas retêm, não preservam." },
            { sym: "46", type: "h2", exit: "up", text: "Conteúdo sem URL fixa. Stories que evaporam." },
            { sym: "47", type: "h2", exit: "left", text: "A internet passou a se comportar como uma pessoa com TDAH severo." },
            { sym: "48", type: "h1", exit: "left", text: "'ESTÁ TUDO SALVO'. Nunca esteve." },
            { sym: "49", type: "h2", exit: "up", text: "Você tem: prints, backups desesperados e links quebrados." },
            { sym: "50", type: "h1", exit: "zoom", text: "Um grande palimpsesto — sempre reescrito, nunca lembrado." },
            
            { sym: "V", type: "display", exit: "up", text: "O GOLPE FINAL: A IA" },
            { sym: "51", type: "h1", exit: "left", text: "Esquecimento à escala industrial." },
            { sym: "52", type: "h2", exit: "left", text: "A IA desvincula o conhecimento da sua origem." },
            { sym: "53", type: "display", exit: "zoom", text: "EU NÃO SOU CITADO. SOU DIGERIDO." },
            { sym: "54", type: "h1", exit: "up", text: "A memória deixa de ser arquivo e vira estatística." },
            
            { sym: "&", type: "display", exit: "up", text: "O PARADOXO CENTRAL" },
            { sym: "55", type: "h2", exit: "left", text: "Quanto mais a internet se torna inteligente..." },
            { sym: "56", type: "h1", exit: "left", text: "...menos ela se lembra de si mesma." },
            { sym: "57", type: "h2", exit: "up", text: "Antes: Você via a data, entendia o momento, sabia quem escreveu." },
            { sym: "58", type: "h2", exit: "left", text: "Agora: Uma resposta sem caminho, sem contexto, sem tempo." },
            { sym: "59", type: "h1", exit: "zoom", text: "O conhecimento ficou instantâneo. E descartável." },
            
            { sym: "60", type: "h2", exit: "up", text: "Procurei algo que eu mesmo escrevi. Achei uma versão resumida por IA." },
            { sym: "61", type: "h1", exit: "left", text: "Sem meu nome. Sem meu tom. Sem minha raiva." },
            { sym: "62", type: "display", exit: "zoom", text: "ENTÃO É ASSIM QUE A WEB ACABA." },
            { sym: "63", type: "h2", exit: "up", text: "Não com silêncio. Mas com respostas perfeitas demais." },
            
            { sym: "64", type: "h1", exit: "left", text: "Mas a memória não morreu. Ela migrou para nichos." },
            { sym: "65", type: "h2", exit: "left", text: "Wikis bem cuidadas. Repositórios. Humanos teimosos." },
            { sym: "66", type: "display", exit: "up", text: "A INTERNET NÃO ESTÁ ESQUECENDO POR ACIDENTE." },
            { sym: "67", type: "display", exit: "zoom", text: "ELA ESTÁ ESQUECENDO POR DESIGN." }
        ];

        // Variáveis de Cores de Fundo (Ciclo sutil de tons escuros)
        const bgColors = ["#030305", "#050303", "#030504", "#050403", "#010101"];

        const container = document.getElementById('canvas-container');
        const hudCounter = document.getElementById('hud-counter');
        const hudProgress = document.getElementById('hud-progress');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        let currentSlideIndex = 0;
        let slideElements = [];

        // CONSTRUÇÃO DO HTML
        function initBuilder() {
            scriptData.forEach((frame, idx) => {
                const section = document.createElement('section');
                section.className = 'slide';
                section.style.backgroundColor = bgColors[idx % bgColors.length];
                section.dataset.index = idx;
                section.dataset.exit = frame.exit;

                // Adiciona o SVG Gigante (Número/Ideia)
                const watermark = document.createElement('div');
                watermark.className = 'watermark';
                watermark.innerHTML = generateSVG(frame.sym);
                section.appendChild(watermark);

                // Adiciona a única frase do frame
                const wrapper = document.createElement('div');
                wrapper.className = 'content-wrapper';
                
                const el = document.createElement('div');
                el.className = `step t-${frame.type}`;
                el.textContent = frame.text;
                
                wrapper.appendChild(el);
                section.appendChild(wrapper);
                container.appendChild(section);
                slideElements.push(section);
            });

            updateSpatialEngine(0);
        }

        // MOTOR ESPACIAL OTIMIZADO PARA 70+ FRAMES
        function updateSpatialEngine(direction = 1) {
            slideElements.forEach((slide, index) => {
                const exitEffect = slide.dataset.exit;
                const isPast = index < currentSlideIndex;
                const isActive = index === currentSlideIndex;
                const isUpcoming = index > currentSlideIndex;

                slide.className = 'slide'; // Reset base class

                if (isActive) {
                    slide.style.display = 'flex';
                    slide.classList.add('active');
                    const step = slide.querySelector('.step');
                    if(step) step.classList.add('visible');
                } 
                else if (isPast) {
                    // Otimização de Performance: Oculta slides muito antigos para não sobrepor opacidade
                    if (currentSlideIndex - index > 3) {
                        slide.style.display = 'none';
                    } else {
                        slide.style.display = 'flex';
                        slide.classList.add(`past-${exitEffect}`);
                        const step = slide.querySelector('.step');
                        if(step) step.classList.add('visible');
                    }
                } 
                else if (isUpcoming) {
                    // Otimização: Oculta slides muito no futuro
                    if (index - currentSlideIndex > 2) {
                        slide.style.display = 'none';
                    } else {
                        slide.style.display = 'flex';
                        slide.classList.add(`upcoming-${exitEffect}`);
                        const step = slide.querySelector('.step');
                        if(step) step.classList.remove('visible');
                    }
                }
            });

            // Formatação do contador
            const currentStr = String(currentSlideIndex + 1).padStart(2, '0');
            const totalStr = String(slideElements.length).padStart(2, '0');
            
            hudCounter.textContent = `${currentStr} / ${totalStr}`;
            hudProgress.style.width = `${(currentSlideIndex / (slideElements.length - 1)) * 100}%`;
            
            btnPrev.classList.toggle('disabled', currentSlideIndex === 0);
            btnNext.classList.toggle('disabled', currentSlideIndex === slideElements.length - 1);
        }

        function nextAction() {
            if (currentSlideIndex < slideElements.length - 1) {
                currentSlideIndex++;
                updateSpatialEngine(1);
            }
        }

        function prevAction() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateSpatialEngine(-1);
            }
        }

        // CONTROLOS
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') {
                e.preventDefault();
                nextAction();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                prevAction();
            }
        });

        container.addEventListener('click', (e) => {
            if (e.clientX > window.innerWidth / 2) nextAction();
            else prevAction();
        });

        btnNext.addEventListener('click', (e) => { e.stopPropagation(); nextAction(); });
        btnPrev.addEventListener('click', (e) => { e.stopPropagation(); prevAction(); });

        initBuilder();

    </script>
</body>
</html>
