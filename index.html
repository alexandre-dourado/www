<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fim do www</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305; --text: #ffffff;
            --accent1: #00ffcc; --accent2: #ff0055;
            --hud-color: rgba(255, 255, 255, 0.3);
            --transition-slide: 1s cubic-bezier(0.22, 1, 0.36, 1);
            --transition-step: 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text);
            overflow: hidden; cursor: none; width: 100vw; height: 100vh;
        }
        #canvas-container { position: relative; width: 100%; height: 100%; perspective: 1000px; }
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
            padding: 8vw 6vw; pointer-events: none;
            transition: transform var(--transition-slide), opacity var(--transition-slide), filter var(--transition-slide);
            z-index: 1;
        }
        .slide.upcoming-left { transform: translateX(30vw) scale(0.95); opacity: 0; filter: blur(5px); }
        .slide.upcoming-up   { transform: translateY(30vh) scale(0.95); opacity: 0; filter: blur(5px); }
        .slide.upcoming-zoom { transform: scale(0.5); opacity: 0; filter: blur(20px); }
        
        .slide.active { transform: translate(0, 0) scale(1); opacity: 1; filter: blur(0); pointer-events: auto; z-index: 10; }
        
        .slide.past-left { transform: translateX(-15vw) scale(0.8); opacity: 0.04; filter: blur(8px); z-index: 0; }
        .slide.past-up { transform: translateY(-20vh) scale(0.8); opacity: 0.04; filter: blur(8px); z-index: 0; }
        .slide.past-zoom { transform: scale(12); opacity: 0; filter: blur(10px); z-index: 20; }
        .slide[class*="past"] .step { opacity: 1 !important; transform: translate(0, 0) !important; transition: none !important; }

        .content-wrapper { position: relative; z-index: 2; width: 100%; max-width: 90vw; }
        .step { opacity: 0; transform: translateY(40px); transition: opacity var(--transition-step), transform var(--transition-step); margin-bottom: 2vh; }
        .step.visible { opacity: 1; transform: translateY(0); }

        .t-display { font-size: clamp(50px, 12vw, 200px); font-weight: 900; line-height: 0.85; letter-spacing: -0.05em; margin-bottom: 4vh; text-transform: uppercase; }
        .t-h1 { font-size: clamp(40px, 8vw, 130px); font-weight: 800; line-height: 0.9; letter-spacing: -0.04em; margin-bottom: 3vh; text-transform: uppercase; }
        .t-h2 { font-size: clamp(28px, 5vw, 75px); font-weight: 600; letter-spacing: -0.03em; color: var(--accent1); margin-bottom: 2vh; line-height: 1; }
        .t-body { font-size: clamp(20px, 3vw, 42px); font-weight: 400; line-height: 1.3; color: #b0b0b0; max-width: 80vw; letter-spacing: -0.01em; margin-bottom: 3vh; }
        .t-label { font-size: clamp(12px, 1vw, 20px); font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent2); border: 2px solid var(--accent2); padding: 0.5em 1em; border-radius: 4px; display: inline-block; margin-bottom: 5vh; }

        .watermark { position: absolute; top: 50%; right: -10%; transform: translateY(-50%) rotate(-10deg) scale(0.8); width: 120vh; height: 120vh; opacity: 0.02; z-index: 0; pointer-events: none; color: var(--text); transition: transform 15s linear, opacity var(--transition-slide); }
        .slide.active .watermark { transform: translateY(-50%) rotate(5deg) scale(1.1); opacity: 0.05; }

        #hud { position: fixed; bottom: 0; left: 0; width: 100%; padding: 2vw; display: flex; justify-content: space-between; align-items: flex-end; z-index: 100; pointer-events: none; }
        #hud:hover, #hud.active-hover * { cursor: auto; pointer-events: auto; }
        .hud-left, .hud-right { display: flex; align-items: center; gap: 1.5vw; }
        .counter { font-variant-numeric: tabular-nums; font-size: 14px; font-weight: 600; color: var(--hud-color); letter-spacing: 0.1em; }
        .progress-track { width: 15vw; height: 2px; background: rgba(255,255,255,0.1); position: relative; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--text); width: 0%; transition: width 0.4s ease; }
        .nav-btn { background: none; border: 1px solid var(--hud-color); color: var(--text); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; opacity: 0.5; transition: all 0.3s; }
        .nav-btn:hover { opacity: 1; border-color: var(--text); transform: scale(1.1); }
        .nav-btn.disabled { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">
        <div class="hud-left"><div class="counter" id="hud-counter">00 / 00</div><div class="progress-track"><div class="progress-bar" id="hud-progress"></div></div></div>
        <div class="hud-right">
            <button class="nav-btn" id="btn-prev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
            <button class="nav-btn" id="btn-next"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
    </div>

    <script>
        // Dicionário de SVGs comprimido
        const svgs = {
            globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><circle cx="12" cy="12" r="10"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(90 12 12)"/><path d="M2 12h20"/></svg>',
            cursor: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M4 4l6 16 3-7 7-3-16-6z"/></svg>',
            eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>',
            brain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v7M12 15v7M2 12h7M15 12h7M4.9 4.9l5 5M14.1 14.1l5 5M4.9 19.1l5-5M14.1 9.9l5-5"/></svg>',
            arrows: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>',
            clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
            disk: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',
            broken: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>',
            ghost: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>',
            fire: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>',
            path: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M3 3v18h18"/><path d="M3 12h18M12 3v18"/></svg>'
        };

        // Parser Comprimido (b: bgColor, e: exitEffect, s: svgKey, st: steps[{t: tipo, c: conteudo}])
        const rawData = [
            // CAP 1
            {b:"#050505", e:"up", s:"globe", st:[{t:"label",c:"ARQUIVO 01"}, {t:"display",c:"Eu vi a internet nascer..."}]},
            {b:"#080b08", e:"left", s:"globe", st:[{t:"h1",c:"...e transformaram num shopping com música alta."}]},
            {b:"#0a0505", e:"up", s:"globe", st:[{t:"h2",c:"Quando eu entrei, ela não tentava me vender nada."}]},
            {b:"#020202", e:"zoom", s:"globe", st:[{t:"display",c:"Hoje ela me conhece melhor que minha mãe."}]},
            
            {b:"#080b08", e:"left", s:"cursor", st:[{t:"label",c:"1994 – 2010"}, {t:"h1",c:"1. WWW ABERTO"}]},
            {b:"#050505", e:"up", s:"cursor", st:[{t:"body",c:"Tinha cheiro de garagem. Links azuis. Fundo branco."}]},
            {b:"#000000", e:"left", s:"cursor", st:[{t:"h2",c:"Você procurava. Clicava. Caía em sites com fundo preto."}]},
            {b:"#030303", e:"zoom", s:"cursor", st:[{t:"h1",c:"Eu não sabia o que estava procurando — e isso era metade da graça."}]},
            
            {b:"#050202", e:"up", s:"cursor", st:[{t:"label",c:"MEMÓRIAS DE UM RANZINZA"}, {t:"body",c:"Mantive um site em HTML puro. Um contador de visitas (meu batimento cardíaco)."}]},
            {b:"#020101", e:"left", s:"cursor", st:[{t:"body",c:"Um livro de visitas onde um alemão escreveu 'Nice page'."}]},
            {b:"#0a0000", e:"zoom", s:"cursor", st:[{t:"h2",c:"Era caótico, lento, feio..."}]},
            {b:"#000000", e:"up", s:"cursor", st:[{t:"display",c:"MAS ERA SEU."}]},
            
            {b:"#0a0505", e:"left", s:"eye", st:[{t:"label",c:"2010 – 2023"}, {t:"h1",c:"2. PLATAFORMAS SOCIAIS"}]},
            {b:"#050303", e:"up", s:"eye", st:[{t:"body",c:"A internet vira shopping center com vigilância privada."}]},
            {b:"#020000", e:"left", s:"eye", st:[{t:"h2",c:"'E se a gente colocasse todo mundo em 5 apps e cobrasse atenção como aluguel?'"}]},
            {b:"#000000", e:"zoom", s:"eye", st:[{t:"display",c:"VOCÊ NÃO NAVEGA. É CONDUZIDO."}]},
            
            {b:"#080202", e:"up", s:"eye", st:[{t:"label",c:"O CUSTO"}, {t:"body",c:"Postei algo incrível: 12 curtidas. Algo idiota: 40 mil views."}]},
            {b:"#050000", e:"left", s:"eye", st:[{t:"body",c:"Apaguei textos longos. Comecei a escrever para algoritmos."}]},
            {b:"#000000", e:"zoom", s:"eye", st:[{t:"h1",c:"Você fala, mas não é ouvido. Só medido."}]},
            
            {b:"#08080a", e:"up", s:"brain", st:[{t:"label",c:"2023 – AGORA"}, {t:"h1",c:"3. INTELIGÊNCIA ARTIFICIAL"}]},
            {b:"#040406", e:"left", s:"brain", st:[{t:"body",c:"A internet sem internet. A IA chega dizendo: 'Relaxa, eu leio por você.'"}]},
            {b:"#010103", e:"up", s:"brain", st:[{t:"body",c:"Elimina o clique. Responde sem mostrar o caminho."}]},
            {b:"#000000", e:"zoom", s:"brain", st:[{t:"display",c:"VOCÊ PERGUNTA O QUE TINHA LÁ."}]},
            
            {b:"#030305", e:"left", s:"brain", st:[{t:"label",c:"SILÊNCIO"}, {t:"body",c:"Passei 20 anos escrevendo na web. Ninguém chega lá."}]},
            {b:"#000000", e:"up", s:"brain", st:[{t:"h2",c:"A IA absorveu, mastigou e respondeu."}]},
            {b:"#050508", e:"zoom", s:"brain", st:[{t:"h1",c:"Nem um link. Nem um obrigado."}]},
            
            {b:"#000000", e:"left", s:"arrows", st:[{t:"label",c:"RESUMO"}, {t:"h2",c:"WWW: Autonomia alta. Plataformas: Baixa. IA: Zero."}]},
            {b:"#030303", e:"zoom", s:"arrows", st:[{t:"display",c:"ANTES EU NAVEGAVA."}]},
            {b:"#000000", e:"up", s:"arrows", st:[{t:"display",c:"HOJE SOU NAVEGADO."}]},
            
            // CAP 2
            {b:"#030305", e:"up", s:"clock", st:[{t:"label",c:"CAPÍTULO II • MEMÓRIA"}, {t:"h2",c:"Quando passamos a registrar tudo..."}]},
            {b:"#000000", e:"zoom", s:"clock", st:[{t:"display",c:"NUNCA ESCREVEMOS TANTO."}]},
            {b:"#050202", e:"up", s:"clock", st:[{t:"h1",c:"E NUNCA ESQUECEMOS TÃO RÁPIDO."}]},
            
            {b:"#030405", e:"left", s:"disk", st:[{t:"label",c:"1995 – 2010"}, {t:"h2",c:"Quando a internet lembrava. Páginas estáticas, fóruns arquivados."}]},
            {b:"#010103", e:"zoom", s:"disk", st:[{t:"h1",c:"A web aceitava envelhecer."}]},
            {b:"#050505", e:"up", s:"disk", st:[{t:"body",c:"Tutorial de 2004 intacto. Fórum morto, mas completo."}]},
            
            {b:"#050202", e:"left", s:"broken", st:[{t:"label",c:"A VIRADA"}, {t:"h2",c:"As plataformas disseram: 'A gente guarda tudo'."}]},
            {b:"#000000", e:"zoom", s:"broken", st:[{t:"display",c:"MENTIRA."}]},
            {b:"#030000", e:"up", s:"broken", st:[{t:"h1",c:"Elas retêm, não preservam."}]},
            {b:"#050101", e:"left", s:"broken", st:[{t:"body",c:"Stories que evaporam. Posts sem contexto."}]},
            {b:"#000000", e:"zoom", s:"broken", st:[{t:"h2",c:"A internet como uma pessoa com TDAH severo."}]},
            
            {b:"#020305", e:"up", s:"ghost", st:[{t:"label",c:"O GOLPE FINAL (IA)"}, {t:"h1",c:"ESQUECIMENTO INDUSTRIAL"}]},
            {b:"#000000", e:"zoom", s:"ghost", st:[{t:"display",c:"NÃO SOU CITADO. SOU DIGERIDO."}]},
            {b:"#050202", e:"left", s:"ghost", st:[{t:"h2",c:"A memória deixou de ser arquivo. E virou estatística."}]},
            
            {b:"#010103", e:"up", s:"ghost", st:[{t:"label",c:"O PARADOXO"}, {t:"body",c:"Quanto mais inteligente a internet se torna..."}]},
            {b:"#000000", e:"zoom", s:"ghost", st:[{t:"h1",c:"Menos ela se lembra de si."}]},
            {b:"#050508", e:"left", s:"ghost", st:[{t:"h2",c:"O conhecimento ficou instantâneo e descartável."}]},
            
            {b:"#020402", e:"up", s:"fire", st:[{t:"label",c:"MAS... (A RESISTÊNCIA)"}, {t:"body",c:"A memória migrou para os nichos. Pessoas obsessivas."}]},
            {b:"#050000", e:"zoom", s:"fire", st:[{t:"h1",c:"Esquecimento por design."}]},

            // CAP 3 (O ÚLTIMO)
            {b:"#000000", e:"left", s:"path", st:[{t:"label",c:"CAPÍTULO III • O ÚLTIMO"}, {t:"display",c:"A IA ESTÁ SUBSTITUINDO A WEB?"}]},
            {b:"#050202", e:"up", s:"path", st:[{t:"h2",c:"(ou: quando perguntar ficou mais confortável do que pensar)"}]},
            {b:"#080101", e:"zoom", s:"path", st:[{t:"h1",c:"Vocês não queriam conhecimento."}]},
            {b:"#000000", e:"left", s:"path", st:[{t:"display",c:"QUERIAM CONVENIÊNCIA."}]},
            
            {b:"#020205", e:"up", s:"path", st:[{t:"label",c:"A INTENÇÃO"}, {t:"h2",c:"Houve um tempo em que buscar algo exigia... intenção."}]},
            {b:"#010103", e:"left", s:"path", st:[{t:"body",c:"Formular a pergunta. Clicar. Comparar. Desconfiar."}]},
            {b:"#000000", e:"zoom", s:"path", st:[{t:"h1",c:"A busca era um percurso."}]},
            {b:"#030303", e:"up", s:"path", st:[{t:"h2",c:"Hoje é um atalho que passa por cima de tudo."}]},
            
            {b:"#050505", e:"left", s:"path", st:[{t:"body",c:"Abrir 10 abas. Cair num site feio, genial. Aprender por acaso."}]},
            {b:"#000000", e:"zoom", s:"path", st:[{t:"display",c:"A WEB TE EDUCAVA PELO EXCESSO."}]},
            
            {b:"#010204", e:"up", s:"brain", st:[{t:"label",c:"O NOVO VERBO"}, {t:"h2",c:"Antes: Navegar. Depois: Consumir."}]},
            {b:"#000000", e:"left", s:"brain", st:[{t:"h1",c:"Agora: Consultar."}]},
            {b:"#030305", e:"up", s:"brain", st:[{t:"body",c:"A IA não te manda explorar. Ela te manda confiar."}]},
            {b:"#050101", e:"zoom", s:"brain", st:[{t:"h2",c:"Perguntar virou o novo clicar."}]},
            
            {b:"#020101", e:"left", s:"brain", st:[{t:"label",c:"O QUE DESAPARECE"}, {t:"body",c:"O problema não é a resposta. É o que some no caminho."}]},
            {b:"#000000", e:"up", s:"brain", st:[{t:"body",c:"Serendipidade. Contexto histórico. Contradições. Erros interessantes."}]},
            {b:"#050202", e:"left", s:"brain", st:[{t:"h1",c:"A IA entrega o meio termo."}]},
            {b:"#080202", e:"zoom", s:"brain", st:[{t:"h2",c:"A web antiga te jogava nos extremos. E lá morava a originalidade."}]},
            
            {b:"#030303", e:"up", s:"cursor", st:[{t:"label",c:"A BATALHA INVISÍVEL"}, {t:"body",c:"'Vale a pena ler 3 textos' — 'Ah, já perguntei pra IA'."}]},
            {b:"#010101", e:"left", s:"cursor", st:[{t:"h2",c:"A IA substitui a web? Não tecnicamente. Sim culturalmente."}]},
            {b:"#000000", e:"zoom", s:"cursor", st:[{t:"h1",c:"A web vira infraestrutura silenciosa."}]},
            {b:"#050505", e:"up", s:"cursor", st:[{t:"display",c:"OS SITES EXISTEM. AS VISITAS NÃO."}]},
            
            {b:"#030101", e:"left", s:"ghost", st:[{t:"label",c:"O COLAPSO"}, {t:"body",c:"Por que escrever bem, argumentar, cuidar de links..."}]},
            {b:"#000000", e:"up", s:"ghost", st:[{t:"h2",c:"...se ninguém chega lá e a resposta vem mastigada?"}]},
            {b:"#080101", e:"zoom", s:"ghost", st:[{t:"display",c:"A IA NÃO MATA O ESCRITOR."}]},
            {b:"#0a0000", e:"left", s:"ghost", st:[{t:"h1",c:"ELA MATA O MOTIVO."}]},
            
            {b:"#020204", e:"up", s:"fire", st:[{t:"label",c:"O VAZIO"}, {t:"body",c:"Tudo igual. Genérico. Nada memorável."}]},
            {b:"#000000", e:"zoom", s:"fire", st:[{t:"h1",c:"O silêncio autoral começa a fazer falta."}]},
            
            {b:"#010201", e:"left", s:"fire", st:[{t:"label",c:"O FUTURO"}, {t:"body",c:"A web aberta não volta. Mas vira um refúgio. Um ato político."}]},
            {b:"#000000", e:"up", s:"fire", st:[{t:"h1",c:"A web antiga não era eficiente. Ela era formativa."}]},
            
            {b:"#050000", e:"zoom", s:"path", st:[{t:"label",c:"A FRASE FINAL"}, {t:"h2",c:"Vocês ganharam respostas. Mas perderam o caminho."}]},
            {b:"#000000", e:"up", s:"path", st:[{t:"display",c:"ERA NO CAMINHO QUE MORAVA A INTELIGÊNCIA."}]},
            
            {b:"#010101", e:"left", s:"globe", st:[{t:"label",c:"EPÍLOGO"}, {t:"body",c:"Se alguém escreve, linka fontes, se importa com a memória..."}]},
            {b:"#000000", e:"up", s:"globe", st:[{t:"h1",c:"Então o WWW não morreu."}]},
            {b:"#020202", e:"zoom", s:"globe", st:[{t:"h2",c:"Ficou mais ranzinza."}]},
            {b:"#000000", e:"up", s:"globe", st:[{t:"display",c:"E MAIS NECESSÁRIO QUE NUNCA."}]}
        ];

        const container = document.getElementById('canvas-container');
        const hudCounter = document.getElementById('hud-counter');
        const hudProgress = document.getElementById('hud-progress');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        let currentSlideIndex = 0;
        let slideElements = [];

        function initBuilder() {
            rawData.forEach((data, idx) => {
                const section = document.createElement('section');
                section.className = 'slide';
                section.style.backgroundColor = data.b;
                section.dataset.exit = data.e;

                const watermark = document.createElement('div');
                watermark.className = 'watermark';
                watermark.innerHTML = svgs[data.s] || svgs['globe'];
                section.appendChild(watermark);

                const wrapper = document.createElement('div');
                wrapper.className = 'content-wrapper';

                data.st.forEach((step) => {
                    const el = document.createElement('div');
                    el.className = `step t-${step.t}`;
                    el.textContent = step.c;
                    wrapper.appendChild(el);
                });

                section.appendChild(wrapper);
                container.appendChild(section);
                slideElements.push(section);
            });
            updateSpatialEngine(0, true);
        }

        function updateSpatialEngine(direction = 1) {
            slideElements.forEach((slide, index) => {
                const exitEffect = slide.dataset.exit;
                slide.className = 'slide';

                if (index === currentSlideIndex) {
                    slide.classList.add('active');
                    slide.querySelectorAll('.step').forEach(s => s.classList.add('visible'));
                } else if (index < currentSlideIndex) {
                    slide.classList.add(`past-${exitEffect}`);
                    slide.querySelectorAll('.step').forEach(s => s.classList.add('visible'));
                } else {
                    slide.classList.add(`upcoming-${exitEffect}`);
                    slide.querySelectorAll('.step').forEach(s => s.classList.remove('visible'));
                }
            });

            const currentStr = String(currentSlideIndex + 1).padStart(2, '0');
            const totalStr = String(slideElements.length).padStart(2, '0');
            hudCounter.textContent = `${currentStr} / ${totalStr}`;
            hudProgress.style.width = `${(currentSlideIndex / (slideElements.length - 1)) * 100}%`;
            
            btnPrev.classList.toggle('disabled', currentSlideIndex === 0);
            btnNext.classList.toggle('disabled', currentSlideIndex === slideElements.length - 1);
        }

        function nextAction() {
            if (currentSlideIndex < slideElements.length - 1) {
                currentSlideIndex++; updateSpatialEngine(1);
            }
        }

        function prevAction() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--; updateSpatialEngine(-1);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); nextAction(); } 
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevAction(); }
        });

        container.addEventListener('click', (e) => {
            if (e.clientX > window.innerWidth / 2) nextAction(); else prevAction();
        });

        btnNext.addEventListener('click', (e) => { e.stopPropagation(); nextAction(); });
        btnPrev.addEventListener('click', (e) => { e.stopPropagation(); prevAction(); });

        initBuilder();
    </script>
</body>
</html>
